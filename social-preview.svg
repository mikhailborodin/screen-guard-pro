<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Screen Privacy Blur social preview source">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071413"/>
      <stop offset="0.52" stop-color="#10211f"/>
      <stop offset="1" stop-color="#052f2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38f5c6"/>
      <stop offset="1" stop-color="#66a6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="blurred">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <g transform="translate(0 285)">
  <circle cx="1005" cy="105" r="220" fill="#38f5c6" opacity="0.12"/>
  <circle cx="165" cy="570" r="250" fill="#66a6ff" opacity="0.10"/>

  <g transform="translate(74 70)">
    <rect x="0" y="0" width="1052" height="490" rx="32" fill="#0b1716" stroke="#2a4945" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1052" height="58" rx="32" fill="#132321"/>
    <circle cx="38" cy="30" r="8" fill="#ff6b6b"/>
    <circle cx="65" cy="30" r="8" fill="#ffd166"/>
    <circle cx="92" cy="30" r="8" fill="#38f5c6"/>

    <g transform="translate(44 96)">
      <text x="0" y="0" fill="#e8fffa" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">Blur sensitive data</text>
      <text x="0" y="62" fill="#8fb4ad" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">before screen sharing</text>
      <text x="0" y="126" fill="#b7d6d0" font-family="Inter, Arial, sans-serif" font-size="24">Screen Privacy Blur for demos, calls, and recordings.</text>
    </g>

    <g transform="translate(56 282)">
      <rect x="0" y="0" width="432" height="150" rx="18" fill="#172826" stroke="#284944"/>
      <text x="28" y="44" fill="#7faaa2" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">BEFORE</text>
      <rect x="28" y="68" width="174" height="17" rx="6" fill="#dfe9e7"/>
      <rect x="28" y="100" width="258" height="17" rx="6" fill="#dfe9e7"/>
      <rect x="304" y="68" width="82" height="17" rx="6" fill="#ff7c7c"/>
      <rect x="304" y="100" width="82" height="17" rx="6" fill="#ff7c7c"/>
    </g>

    <g transform="translate(558 282)">
      <rect x="0" y="0" width="432" height="150" rx="18" fill="#172826" stroke="#38f5c6" stroke-opacity="0.55"/>
      <text x="28" y="44" fill="#38f5c6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AFTER</text>
      <rect x="28" y="68" width="174" height="17" rx="6" fill="#dfe9e7"/>
      <rect x="28" y="100" width="258" height="17" rx="6" fill="#dfe9e7"/>
      <rect x="304" y="60" width="92" height="66" rx="14" fill="#38f5c6" opacity="0.18"/>
      <rect x="304" y="68" width="82" height="17" rx="6" fill="#38f5c6" filter="url(#blurred)" opacity="0.95"/>
      <rect x="304" y="100" width="82" height="17" rx="6" fill="#38f5c6" filter="url(#blurred)" opacity="0.95"/>
    </g>
  </g>

  <g transform="translate(74 584)">
    <rect x="0" y="-31" width="252" height="42" rx="21" fill="url(#accent)" opacity="0.95"/>
    <text x="24" y="-4" fill="#031514" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Screen Privacy Blur</text>
  </g>
  </g>
</svg>
