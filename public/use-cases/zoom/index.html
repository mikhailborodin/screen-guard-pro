<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen privacy for Zoom demos | Screen Privacy Blur</title>
    <meta name="description" content="Cover sensitive browser fields before sharing a window or tab during Zoom calls and recordings." />
    <link rel="canonical" href="https://privacyblur.co/use-cases/zoom" />
    <meta property="og:title" content="Screen privacy for Zoom demos" />
    <meta property="og:description" content="Cover sensitive browser fields before sharing a window or tab during Zoom calls and recordings." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://privacyblur.co/use-cases/zoom" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Screen privacy for Zoom demos" />
    <meta name="twitter:description" content="Cover sensitive browser fields before sharing a window or tab during Zoom calls and recordings." />
    <meta name="twitter:image" content="https://privacyblur.co/social-preview.png" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #061211;
        color: #f4fffc;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
          radial-gradient(circle at 80% 5%, rgba(54, 245, 198, 0.16), transparent 32%),
          #061211;
        background-size: 64px 64px, 64px 64px, auto, auto;
      }
      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }
      a { color: #6ee7d0; }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 72px;
        color: #dffdf7;
        text-decoration: none;
        font-weight: 700;
      }
      .mark {
        display: grid;
        height: 38px;
        width: 38px;
        place-items: center;
        border-radius: 12px;
        background: rgba(54, 245, 198, 0.18);
        color: #6ee7d0;
      }
      .eyebrow {
        display: inline-flex;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 999px;
        padding: 8px 14px;
        color: #9fbcb6;
        background: rgba(255,255,255,0.04);
        font-size: 14px;
      }
      h1 {
        max-width: 820px;
        margin: 28px 0 20px;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.96;
        letter-spacing: 0;
      }
      p {
        max-width: 720px;
        color: #acc5c0;
        font-size: 20px;
        line-height: 1.65;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 34px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        border-radius: 14px;
        padding: 0 22px;
        background: #6ee7d0;
        color: #031514;
        font-weight: 800;
        text-decoration: none;
      }
      .link {
        display: inline-flex;
        align-items: center;
        min-height: 52px;
        color: #dffdf7;
        text-decoration: none;
      }
      footer {
        margin-top: 88px;
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        color: #78938d;
        font-size: 14px;
      }
      footer a { color: #9fbcb6; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="/">
        <span class="mark">◇</span>
        <span>Screen Privacy Blur</span>
      </a>
      <span class="eyebrow">Use case</span>
      <h1>Screen privacy for Zoom demos</h1>
      <p>Cover sensitive browser fields before sharing a window or tab during Zoom calls and recordings.</p>
      <div class="actions">
        <a class="button" href="https://chromewebstore.google.com/detail/pfngjkakgncabcfjdknjacpnbidjlldm?utm_source=item-share-cb">Add to Chrome - Free</a>
        <a class="link" href="/support">Contact support</a>
      </div>
      <footer>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms</a>
        <a href="/data-collection">Data Collection</a>
        <a href="/permissions">Permissions</a>
        <a href="/support">Support</a>
      </footer>
    </main>
  </body>
</html>
